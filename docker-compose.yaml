# docker-compose.yaml
version: '3.8'

services:
  bot:
    build: .
    container_name: hybrid_bot
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
