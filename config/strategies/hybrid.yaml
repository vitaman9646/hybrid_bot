# config/strategies/hybrid.yaml
name: "Hybrid Trend Impulse v1"
mode: "weighted"
min_score: 0.55
min_partial_sources: 2

# Dynamic weight adjustment
dynamic_weights:
  enabled: true
  update_interval: 14400   # 4 hours cooldown (по рекомендации)
  min_signals_required: 50
  store_in: "memory"       # memory / redis / timescaledb

analyzers:
  vector:
    enabled: true
    weight: 0.4
    frame_size: 0.2
    time_frame: 2.0
    min_spread_size: 0.3
    min_trades_per_frame: 3
    min_volume: 5000
    order_distance: 5
    use_adaptive_distance: false
    use_detect_shot: false
    
  averages:
    enabled: true
    weight: 0.3
    long_period: 300
    short_period: 30
    min_delta: -1.5
    
  depth_shot:
    enabled: true
    weight: 0.3
    target_volume_usdt: 500000
    min_distance: 0.5
    max_distance: 3.0
    buffer: 300

filters:
  delta:
    - timeframe: 5m
      range: [0.3, 5.0]
      type: absolute
    - timeframe: 1h
      range: [0.5, 10.0]
      type: absolute
  
  volume_24h:
    min: 5000000
    max: 999999999999
    
  funding:
    range: [-0.5, 0.5]
    pause_before: 60
    pause_after: 60
    # Adaptive funding filter
    adaptive:
      enabled: true
      long_pause_above: 0.1    # funding > 0.1% → pause long
      short_pause_below: -0.1  # funding < -0.1% → pause short

  mark_price:
    range: [-0.5, 0.5]
    
  volatility:
    dead_market_threshold: 0.05
    chaos_threshold: 5.0

order:
  direction: auto
  size_usdt: 50
  type: limit
  
  take_profit:
    type: classic
    percent: 0.8
    auto_reduce:
      enabled: true
      timer: 30
      step: 0.1
      threshold: 0.2
      
  stop_loss:
    percent: 1.5
    spread: 0.1
    delay: 0
    type: market
    
  trailing:
    enabled: true
    spread: 0.3
    adaptive: true
    
  second_sl:
    enabled: true
    trigger: 0.5
    distance: 0.2

  grid:
    enabled: false
    count: 3
    distance: 0.3
    increase: 50

  max_drawdown_pct: 5.0
