aggregator:
  entry_threshold: 0.40
  imbalance_threshold: 0.55
  mode: weighted
  scenario4_vol_max: 3.0
  scenario4_vol_min: 0.1
  use_imbalance_filter: false
  weight_averages: 0.3
  weight_depth: 0.2
  weight_vector: 0.5

  # Per-scenario thresholds (v2)
  thresholds:
    all_three:       0.40   # S4: все три подтверждают — можно ниже
    averages_vector: 0.60   # S2: тренд + импульс
    vector_depth:    0.55   # S1: импульс + уровень
    averages_depth:  0.65   # S3: mean reversion — осторожнее

  # Умный cooldown (v2)
  cooldown:
    default:  60.0   # первый сигнал / неизвестный исход
    after_tp: 45.0   # после тейка — рынок двигается, можно быстрее
    after_sl: 120.0  # после стопа — пауза, рынок против нас

  # Opposite exit (v2)
  opposite_exit:
    enabled: true
    close_threshold:   0.50   # score >= 0.50 → закрыть позицию
    reverse_threshold: 0.85   # score >= 0.85 → закрыть + реверс

analyzers:
  averages:
    long_period: 300.0
    min_delta_pct: 0.05
    overbought_delta: 0.8
    oversold_delta: -0.8
    short_period: 60.0
  depth_shot:
    buffer_pct: 0.2
    max_distance_pct: 2.5
    min_distance_pct: 0.1
    min_volume_usdt: 200000
    stop_if_outside: true
    tp_pct: 0.3
    tp_type: classic
  vector:
    chaos_threshold: 5.0
    dead_threshold: 0.001
    frame_size: 0.2
    min_quote_volume: 50
    min_spread_size: 0.003
    min_trades_per_frame: 1
    time_frame: 0.6
    use_detect_shot: false

dynamic_weights:
  enabled: true
  min_signals_required: 50
  store_in: memory
  update_interval: 14400

filters:
  max_mark_deviation_pct: 0.3
  max_spread_pct: 0.3
  correlation_filter_enabled: true
  correlation_penalty: 0.6
  correlation_window_sec: 60
  correlated_pairs:
    - [BTCUSDT, ETHUSDT]
    - [SOLUSDT, AVAXUSDT, ADAUSDT]
    - [BNBUSDT, XRPUSDT]
  delta:
  - range:
    - 0.3
    - 5.0
    timeframe: 5m
    type: absolute
  - range:
    - 0.5
    - 10.0
    timeframe: 1h
    type: absolute
  funding:
    adaptive:
      enabled: true
      long_pause_above: 0.1
      short_pause_below: -0.1
    pause_after: 60
    pause_before: 60
    range:
    - -0.5
    - 0.5
  mark_price:
    range:
    - -0.5
    - 0.5
  volatility:
    chaos_threshold: 5.0
    dead_market_threshold: 0.05
  volume_24h:
    max: 999999999999
    min: 5000000

min_partial_sources: 2
min_score: 0.5
mode: weighted
name: Hybrid Trend Impulse v2

order:
  direction: auto
  grid:
    count: 3
    distance: 0.3
    enabled: false
    increase: 50
  max_drawdown_pct: 5.0
  second_sl:
    distance: 0.2
    enabled: true
    trigger: 0.5
  size_usdt: 10.0
  stop_loss:
    delay: 0
    percent: 1.0
    spread: 0.1
    type: market
  take_profit:
    auto_reduce:
      enabled: true
      step: 0.1
      threshold: 0.2
      timer: 30
    percent: 2.0
    type: classic
  trailing:
    adaptive: true
    enabled: true
    spread: 0.3
    activation_pct: 0.4  # trailing активируется только после +0.4%
  type: limit

risk:
  corr_block_enabled: true
  daily_loss_limit_usdt: 20.0
  drawdown_tiers:
  - - 0.0
    - 1.0
  - - -1.0
    - 0.5
  - - -2.0
    - 0.25
  - - -3.0
    - 0.0
  max_size_usdt: 50.0
  min_size_usdt: 5.0
  position_pct: 10.0
  max_trades_per_day: 50
  max_concurrent_positions: 4

circuit_breaker:
  max_consecutive_losses: 3
  max_losses_per_hour: 5
  max_drawdown_pct: 5.0
  soft_cooldown_sec: 900
  hard_cooldown_sec: 1800
